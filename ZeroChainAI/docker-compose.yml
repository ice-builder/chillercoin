version: "3.9"

services:
  zeroscan:
    build: .
    container_name: zeroscan-orchestrator
    restart: unless-stopped

    # ── Security Hardening ─────────────────────────────────
    read_only: true                    # Read-only filesystem
    security_opt:
      - no-new-privileges:true         # Cannot escalate to root
      - apparmor:unconfined            # Replace with custom profile in prod
    cap_drop:
      - ALL                            # Drop ALL capabilities
    cap_add:
      - NET_BIND_SERVICE               # Only allow port binding

    # Writable tmpfs mounts (in RAM, not on disk)
    tmpfs:
      - /tmp:size=100m,mode=1777
      - /var/tmp:size=50m

    # Persistent data volumes
    volumes:
      - zeroscan_data:/data            # SQLite cache
      - zeroscan_logs:/var/log/zeroscan

    # ── Network ───────────────────────────────────────────
    network_mode: host                 # Needed to access WireGuard interface
    # API only binds to 127.0.0.1 — accessible via VPN through the host

    # ── Resource Limits ───────────────────────────────────
    mem_limit: 2g
    memswap_limit: 2g
    cpus: "2.0"

    # ── Environment ───────────────────────────────────────
    # ONLY Vault token here — all secrets fetched from Vault at runtime
    environment:
      VAULT_TOKEN: ${VAULT_TOKEN}
      VAULT_ADDR: ${VAULT_ADDR:-http://127.0.0.1:8200}
      CACHE_DB: /data/zeroscan_cache.db
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"

    # No .env file with actual secrets — only VAULT_TOKEN
    # env_file: .env  ← intentionally disabled

    # ── Health ────────────────────────────────────────────
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8443/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    # ── Logging ───────────────────────────────────────────
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  zeroscan_data:
    driver: local
  zeroscan_logs:
    driver: local

# No external networks — container uses host networking
# API is only accessible via WireGuard VPN to the host
