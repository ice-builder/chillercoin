<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Reset Momentum</title></head>
<body style="background:#0d1117;color:#e6edf3;font-family:system-ui;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0">
<div style="background:#161b22;border-radius:16px;padding:40px;text-align:center;max-width:600px;width:90%">
<h1 id="st" style="color:#58a6ff">Resetting...</h1>
<p id="nfo"></p>
</div>
<script>
localStorage.removeItem('momentum_app_data');
localStorage.removeItem('momentum_version');
localStorage.removeItem('house_seeded');
document.getElementById('st').textContent = '\u2705 Data reset!';
document.getElementById('st').style.color = '#3fb950';
document.getElementById('nfo').innerHTML = '<a href="./" style="color:#58a6ff;font-size:22px">\u2192 Open Momentum</a>';
</script>
</body></html>
